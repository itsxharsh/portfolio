name: Deploy Portfolio to GitHub Pages

on:
  # Runs on pushes targeting your default branch
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

# Set environment variables for the build process, using repository variables
env:
  VITE_APP_TITLE: ${{ vars.VITE_APP_TITLE }}
  VITE_APP_URL: ${{ vars.VITE_APP_URL }}
  VITE_APP_BASE_URL: ${{ vars.VITE_APP_BASE_URL }}
  VITE_APP_AUTHOR: ${{ vars.VITE_APP_AUTHOR }}

jobs:
  # Single deploy job since we're just deploying
  build:
    # name: Build
    # environment:
    #   name: github-pages
    #   url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
